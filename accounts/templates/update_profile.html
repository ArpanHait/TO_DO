<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Profile</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255, 0, 255, 0.15) 0%, transparent 50%),
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            background-position: center, center, center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #e2e8f0;
        }
        .update-container {
            background: rgba(11, 15, 25, 0.6);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1), inset 0 0 10px rgba(255, 0, 255, 0.05);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            text-align: center;
        }
        .update-container h2 {
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            margin-top: 0;
            margin-bottom: 24px;
        }
        .update-container form {
            display: flex;
            flex-direction: column;
        }
        .update-container input[type="file"] {
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 4px;
            font-size: 16px;
            transition: all 0.3s ease;
            background-color: rgba(0, 0, 0, 0.3);
            color: #e2e8f0;
            cursor: pointer;
            box-sizing: border-box;
            width: 100%;
        }
        .update-container input[type="file"]:focus {
            border-color: #00ffff;
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            background-color: rgba(0, 0, 0, 0.5);
        }
        .update-container input[type="file"]::-webkit-file-upload-button {
            background-color: #1e293b;
            color: #00ffff;
            border: 1px solid rgba(0, 255, 255, 0.4);
            border-radius: 4px;
            padding: 8px 16px;
            margin-right: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .update-container input[type="file"]::-webkit-file-upload-button:hover {
            background-color: #0f172a;
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.5);
        }
        .update-container button {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }
        .update-container button:hover {
            background: linear-gradient(135deg, #00c6f0 0%, #326bc0 100%);
            box-shadow: 0 6px 20px rgba(0, 210, 255, 0.5);
            transform: translateY(-2px);
        }
        .update-container a.cancel-btn {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .update-container a.cancel-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.3);
        }
        .current-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 20px auto;
            border: 2px solid #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }
    </style>
</head>
<body class="light-mode">
    {% include 'auth_theme_particles.html' %}
    <div class="update-container themed-container">
        <h2>Update Profile Photo</h2>
        
        {% if user.profile.image %}
            <img src="{{ user.profile.image.url }}" alt="Current Photo" class="current-photo">
        {% else %}
            <div class="current-photo" style="display: flex; justify-content: center; align-items: center; background: rgba(0, 255, 255, 0.1); color: #00ffff; font-size: 3rem; font-weight: bold; text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);">
                {{ user.username|make_list|first|upper }}
            </div>
        {% endif %}
        
        <form action="" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="file" name="image" accept="image/*" title="Choose a new profile photo" aria-label="Choose a new profile photo" required>
            <button type="submit">Upload Photo</button>
            <a href="{% url 'dashboard' %}" class="cancel-btn">Cancel</a>
        </form>
    </div>
</body>
</html>
