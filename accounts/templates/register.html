<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            
            /* Aesthetic Mesh Grid Background */
            background-color: #0b0f19; /* Deep space dark */
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.08) 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: center;
            position: relative;
        }
        /* Removed to let auth_theme handle dynamic backgrounds */

        .register-container {
            background-color: rgba(20, 25, 40, 0.85);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            position: relative;
            z-index: 1;
        }
        .register-container h2 {
            text-align: center;
            color: #f8fafc;
            margin-top: 0;
            margin-bottom: 24px;
            letter-spacing: 1px;
        }
        .register-container form {
            display: flex;
            flex-direction: column;
        }
        .register-container input[type="text"],
        .register-container input[type="password"],
        .register-container input[type="file"] {
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            font-size: 16px;
            background-color: rgba(0, 0, 0, 0.3);
            color: #f8fafc;
            transition: all 0.3s ease;
        }
        .register-container input[type="file"] {
            color: #94a3b8;
        }
        .register-container input[type="text"]:focus,
        .register-container input[type="password"]:focus,
        .register-container input[type="file"]:focus {
            border-color: #00ffff;
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.3);
            outline: none;
        }
        .register-container input[type="submit"] {
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }
        .register-container input[type="submit"]:hover {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.6);
            transform: translateY(-1px);
        }
        .register-container p {
            text-align: center;
            margin-top: 24px;
            color: #94a3b8;
            font-size: 14px;
        }
        .register-container a {
            color: #00ffff;
            text-decoration: none;
            font-weight: bold;
            transition: text-shadow 0.3s ease;
        }
        .register-container a:hover {
            text-decoration: none;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.6);
        }
        /* Message Styles */
        .alert {
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid transparent;
            border-radius: 6px;
            text-align: center;
            font-size: 0.95rem;
        }
        .alert-success {
            color: #34d399;
            background-color: rgba(52, 211, 153, 0.1);
            border-color: rgba(52, 211, 153, 0.2);
        }
        .alert-error {
            color: #fb7185;
            background-color: rgba(251, 113, 133, 0.1);
            border-color: rgba(251, 113, 133, 0.2);
        }
    </style>
</head>
<body>
    {% include 'auth_theme_particles.html' %}
    <div class="register-container themed-container">
        <h2>Create an Account</h2>
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}" role="alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        <form action="" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="text" name="uname" placeholder="Username" required>
            <input type="password" name="pwd" placeholder="Password" required>
            <input type="file" name="image" accept="image/*" title="Profile Image" aria-label="Profile Image">
            <input type="submit" value="Register">
        </form>
        <p>Already have an account? <a href="{% url 'login' %}">Login</a></p>
    </div>
</body>
</html>
