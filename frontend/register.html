<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
    <script src="app.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif !important;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            
            /* Aesthetic Mesh Grid Background */
            background-color: #0b0f19; /* Deep space dark */
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.08) 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: center;
            position: relative;
        }

        .register-container {
            background-color: rgba(20, 25, 40, 0.85);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            will-change: transform;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            position: relative;
            z-index: 1;
        }
        .register-container h2 {
            text-align: center;
            color: #f8fafc;
            margin-top: 0;
            margin-bottom: 24px;
            letter-spacing: 1px;
        }
        .register-container form {
            display: flex;
            flex-direction: column;
        }
        .register-container input[type="text"],
        .register-container input[type="password"],
        .register-container input[type="file"] {
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            font-size: 16px;
            background-color: rgba(0, 0, 0, 0.3);
            color: #f8fafc;
            transition: all 0.3s ease;
            box-sizing: border-box;
            width: 100%;
        }
        .register-container input[type="file"] {
            color: #94a3b8;
            cursor: pointer;
        }
        .register-container input[type="text"]:focus,
        .register-container input[type="password"]:focus,
        .register-container input[type="file"]:focus {
            border-color: #00ffff;
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.3);
            outline: none;
        }
        .register-container input[type="submit"] {
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }
        .register-container input[type="submit"]:hover {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.6);
            transform: translateY(-1px);
        }
        .register-container p {
            text-align: center;
            margin-top: 24px;
            color: #94a3b8;
            font-size: 14px;
        }
        .register-container a {
            color: #00ffff;
            text-decoration: none;
            font-weight: bold;
            transition: text-shadow 0.3s ease;
        }
        .register-container a:hover {
            text-decoration: none;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.6);
        }
        /* Message Styles */
        .alert {
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid transparent;
            border-radius: 6px;
            text-align: center;
            font-size: 0.95rem;
        }
        .alert-success {
            color: #34d399;
            background-color: rgba(52, 211, 153, 0.1);
            border-color: rgba(52, 211, 153, 0.2);
        }
        .alert-error {
            color: #fb7185;
            background-color: rgba(251, 113, 133, 0.1);
            border-color: rgba(251, 113, 133, 0.2);
        }
    </style>
</head>
<body>
    <!-- Theme & Connected Particles (Inlined from templates/auth_theme_particles.html) -->
    <style>
        :root {
            --bg-main: #0b0f19;
            --grid-line: rgba(0, 255, 255, 0.08);
            --glow-center: rgba(255, 0, 255, 0.15);
            
            --container-bg: rgba(20, 25, 40, 0.85);
            --container-border: rgba(0, 255, 255, 0.2);
            --container-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 255, 255, 0.1);
            
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            
            --input-bg: rgba(0, 0, 0, 0.3);
            --input-border: rgba(255, 255, 255, 0.1);
            
            --accent: #00ffff;
            --accent-glow: rgba(0, 255, 255, 0.3);
            --btn-grad-start: #0ea5e9;
            --btn-grad-end: #6366f1;
        }

        body.light-mode {
            --bg-main: #f0f4f8;
            --grid-line: rgba(0, 0, 0, 0.04);
            --glow-center: rgba(0, 0, 255, 0.05);
            
            --container-bg: rgba(255, 255, 255, 0.85);
            --container-border: rgba(0, 0, 0, 0.1);
            --container-shadow: 0 10px 30px rgba(0, 0, 0, 0.1), 0 0 20px rgba(0, 0, 0, 0.05);
            
            --text-primary: #1e293b;
            --text-secondary: #475569;
            
            --input-bg: rgba(255, 255, 255, 0.8);
            --input-border: rgba(0, 0, 0, 0.2);
            
            --accent: #0284c7;
            --accent-glow: rgba(2, 132, 199, 0.3);
            --btn-grad-start: #3b82f6;
            --btn-grad-end: #8b5cf6;
        }

        body {
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(circle at center, var(--glow-center), transparent 60%),
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-primary);
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .themed-container {
            background: var(--container-bg) !important;
            border: 1px solid var(--container-border) !important;
            box-shadow: var(--container-shadow) !important;
            color: var(--text-primary) !important;
        }
        .themed-container h2 { color: var(--text-primary) !important; }
        .themed-container p { color: var(--text-secondary) !important; }
        .themed-container input[type="text"], 
        .themed-container input[type="password"],
        .themed-container input[type="file"] {
            background-color: var(--input-bg) !important;
            border-color: var(--input-border) !important;
            color: var(--text-primary) !important;
        }
        .themed-container input:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 8px var(--accent-glow) !important;
        }
        .themed-container input[type="submit"] {
            background: linear-gradient(135deg, var(--btn-grad-start), var(--btn-grad-end)) !important;
        }
        .themed-container a { color: var(--accent) !important; }

        #tsparticles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .theme-switch-wrapper {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        #theme-toggle-btn {
            background: var(--container-bg);
            border: 1px solid var(--container-border);
            color: var(--text-primary);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
            box-shadow: var(--container-shadow);
            transition: all 0.3s ease;
        }
        #theme-toggle-btn:hover {
            transform: scale(1.1);
        }
    </style>
    
    <div id="tsparticles"></div>
    <div class="theme-switch-wrapper">
        <button id="theme-toggle-btn" title="Toggle Day/Night Mode">🌙</button>
    </div>

    <!-- Container -->
    <div class="register-container themed-container">
        <h2>Create an Account</h2>
        <div id="alertBox"></div>
        <form id="registerForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <input type="file" id="image" accept="image/*" title="Profile Image" aria-label="Profile Image">
            <input type="submit" value="Register" id="submitBtn">
        </form>
        <p>Already have an account? <a href="login.html">Login</a></p>
    </div>

    <script>
        // Form submit logic
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertBox = document.getElementById('alertBox');
            const submitBtn = document.getElementById('submitBtn');
            alertBox.innerHTML = '';
            
            const uname = document.getElementById('username').value;
            const pwd = document.getElementById('password').value;
            const imageFile = document.getElementById('image').files[0];
            
            submitBtn.disabled = true;
            submitBtn.value = 'Registering...';

            await configPromise;

            try {
                const formData = new FormData();
                formData.append('username', uname);
                formData.append('password', pwd);
                if (imageFile) {
                    formData.append('image', imageFile);
                }

                const res = await fetch(`${API_BASE}/api/auth/register/`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Registration failed');
                
                setToken(data.token);
                setUser(data.user);
                
                // Navigate with transition delay
                document.body.style.animation = "fadeOut 0.35s ease-out forwards";
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 300);
            } catch (err) {
                alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
                submitBtn.disabled = false;
                submitBtn.value = 'Register';
            }
        });

        // Theme and Particles setup (identical to templates/auth_theme_particles.html)
        document.addEventListener('DOMContentLoaded', () => {
            const body = document.body;
            const toggleBtn = document.getElementById('theme-toggle-btn');
            
            const savedTheme = localStorage.getItem('theme') || 'light';
            
            const loadParticles = (theme) => {
                let pColor = theme === 'light' ? "#3b82f6" : "#00ffff";
                let lColor = theme === 'light' ? "#8b5cf6" : "#ff00ff";
                
                tsParticles.load("tsparticles", {
                    fpsLimit: 60,
                    particles: {
                        number: { value: 50, density: { enable: true, value_area: 800 } },
                        color: { value: pColor },
                        links: { enable: true, color: lColor, distance: 150, opacity: 0.4, width: 1 },
                        move: { enable: true, speed: 1.5, direction: "none", random: false, straight: false, outModes: "out" },
                        size: { value: { min: 1, max: 3 } },
                        opacity: { value: 0.5 }
                    },
                    interactivity: {
                        events: {
                            onHover: { enable: true, mode: "grab" },
                            onClick: { enable: true, mode: "push" }
                        },
                        modes: {
                            grab: { distance: 180, links: { opacity: 0.8 } },
                            push: { quantity: 4 }
                        }
                    }
                });
            };

            const applyTheme = (theme) => {
                if (theme === 'light') {
                    body.classList.add('light-mode');
                    toggleBtn.textContent = '☀️';
                } else {
                    body.classList.remove('light-mode');
                    toggleBtn.textContent = '🌙';
                }
                localStorage.setItem('theme', theme);
                loadParticles(theme);
            };

            applyTheme(savedTheme);

            toggleBtn.addEventListener('click', () => {
                const current = body.classList.contains('light-mode') ? 'light' : 'dark';
                applyTheme(current === 'light' ? 'dark' : 'light');
            });
        });
    </script>
</body>
</html>
