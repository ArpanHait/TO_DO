<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard TO_DO</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="app.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif !important;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(135deg, #0f172a, #1e1b4b);
            background-size: 40px 40px, 40px 40px, 100% 100%;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding-top: 80px; /* Provide space for the fixed navbar */
            box-sizing: border-box; /* Ensure padding is included in the total height */
        }
        
        .dashboard-container {
            max-width: 1000px;
            width: 90%;
            margin: 40px auto;
            flex: 1; /* Pushes potential footer to the bottom */
            z-index: 10;
        }
        
        .welcome-banner {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
            margin-bottom: 30px;
        }
        
        .welcome-banner h1 {
            margin: 0;
            font-size: 2.2em;
            font-weight: 800;
        }
        
        .welcome-banner p {
            margin: 10px 0 0 0;
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid #3b82f6;
            transition: transform 0.3s ease;
            color: #1f2937;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-card h3 {
            margin: 0;
            color: #4b5563;
            font-size: 1em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-card .value {
            margin: 15px 0 0 0;
            font-size: 2.5em;
            font-weight: 800;
            color: #1f2937;
        }
        
        /* Todo List Section */
        .todo-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            color: #1f2937;
        }
        
        .todo-header {
            margin-top: 0;
            color: #1f2937;
            font-size: 1.5em;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #f3f4f6;
            padding-bottom: 15px;
        }
        
        .todo-form {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .todo-input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
        }
        
        .todo-input:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .todo-priority {
            padding: 14px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1em;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .todo-priority:focus {
            border-color: #3b82f6;
            outline: none;
        }
        
        .todo-button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        
        .todo-button:hover {
            background: #2563eb;
        }
        
        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .todo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #f9fafb;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 5px solid #e5e7eb;
            transition: all 0.3s ease;
        }
        
        .todo-item:hover {
            transform: scale(1.01);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        
        .todo-title {
            font-weight: 600;
            color: #374151;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .completed-task {
            text-decoration: line-through;
            opacity: 0.6;
        }
        
        .priority-badge {
            font-size: 0.75em;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 800;
            text-transform: uppercase;
        }
        
        .priority-high .priority-badge { background: #fee2e2; color: #ef4444; }
        .priority-medium .priority-badge { background: #fef3c7; color: #d97706; }
        .priority-low .priority-badge { background: #dbeafe; color: #2563eb; }
        
        .todo-actions {
            display: flex;
            gap: 10px;
        }
        
        .todo-complete, .todo-delete {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }
        
        .todo-complete { background: #d1fae5; color: #059669; }
        .todo-complete:hover { background: #10b981; color: white; }
        .todo-delete { background: #fee2e2; color: #dc2626; }
        .todo-delete:hover { background: #ef4444; color: white; }
        
        .todo-empty {
            text-align: center;
            color: #9ca3af;
            padding: 40px;
            font-style: italic;
        }
        
        .todo-item.priority-high { border-left-color: #ef4444; }
        .todo-item.priority-medium { border-left-color: #f59e0b; }
        .todo-item.priority-low { border-left-color: #3b82f6; }
        
        /* Heatmap Styling - Cyberpunk Aesthetics */
        .heatmap-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        .heatmap-scroll-wrapper {
            overflow-x: auto;
            padding-bottom: 15px;
        }
        .heatmap-scroll-wrapper::-webkit-scrollbar { height: 8px; }
        .heatmap-scroll-wrapper::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .heatmap-scroll-wrapper::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .heatmap-scroll-wrapper::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .heatmap-title {
            margin-top: 0;
            color: #1f2937;
            font-size: 1.5em;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #f3f4f6;
            padding-bottom: 15px;
        }
        .heatmap-grid {
            display: flex;
            gap: 4px;
        }
        .heatmap-col {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .heat-box {
            width: 15px;
            height: 15px;
            border-radius: 4px;
            background-color: #ebedf0;
            position: relative;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .heat-box:hover:not(.empty) {
            transform: scale(1.2);
            z-index: 10;
        }
        .heat-box.empty { background-color: transparent; }
        
        .heat-box.level-0 { background-color: #ebedf0; }
        .heat-box.level-1 { background-color: #93c5fd; }
        .heat-box.level-2 { background-color: #3b82f6; }
        .heat-box.level-3 { background-color: #cf00d6; }
        .heat-box.level-4 { background-color: #ff00ff; box-shadow: 0 0 10px rgba(255, 0, 255, 0.7); }

        .heatmap-legend {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
            font-size: 0.9em;
            color: #6b7280;
            justify-content: flex-end;
            font-weight: bold;
        }

        /* Responsive Dark Mode Support */
        body:not(.light-mode) .heatmap-container,
        body:not(.light-mode) .stat-card,
        body:not(.light-mode) .todo-section,
        body:not(.light-mode) .todo-item {
            background-color: #1e293b;
            color: #f8fafc;
        }
        body:not(.light-mode) .todo-title,
        body:not(.light-mode) .todo-header,
        body:not(.light-mode) .heatmap-title,
        body:not(.light-mode) .stat-card h3,
        body:not(.light-mode) .stat-card .value {
            color: #f8fafc;
        }
        body:not(.light-mode) .heatmap-title,
        body:not(.light-mode) .todo-header {
            border-color: #334155;
        }
        body:not(.light-mode) .heat-box.level-0 { background-color: #334155; }
        body:not(.light-mode) .heat-box.level-1 { background-color: #0284c7; }
        body:not(.light-mode) .heat-box.level-2 { background-color: #3b82f6; }
        body:not(.light-mode) .heat-box.level-3 { background-color: #cf00d6; }
        body:not(.light-mode) .heat-box.level-4 { background-color: #ff00ff; box-shadow: 0 0 12px rgba(255, 0, 255, 0.9); }
        
        body:not(.light-mode) .heatmap-scroll-wrapper::-webkit-scrollbar-track { background: #0f172a; }
        body:not(.light-mode) .heatmap-scroll-wrapper::-webkit-scrollbar-thumb { background: #475569; }
        body:not(.light-mode) .todo-input,
        body:not(.light-mode) .todo-priority {
            background-color: #0f172a;
            border-color: #334155;
            color: #f8fafc;
        }

        @media (max-width: 768px) {
            .dashboard-container {
                width: 95%;
                padding: 0 10px;
                margin: 20px auto;
            }
            .welcome-banner { padding: 20px; }
            .welcome-banner h1 { font-size: 1.8em; }
            .stats-grid { grid-template-columns: 1fr; }
            .stat-card { padding: 15px; }
            .todo-section { padding: 15px; }
            .todo-header, .heatmap-title { font-size: 1.3em; }
            .todo-form { flex-direction: column; gap: 10px; }
            .todo-input, .todo-priority, .todo-button { width: 100%; box-sizing: border-box; }
            .todo-item { flex-direction: column; align-items: flex-start; gap: 12px; padding: 15px; }
            .todo-actions { width: 100%; justify-content: flex-end; }
            .heatmap-container { padding: 15px; }
        }
    </style>
</head>

    <script>
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;')
                      .replace(/'/g, '&#039;');
        }

        // Render Heatmap Engine
        function parseAndRenderHeatmap(rawHeatmap) {
            const heatmapEl = document.getElementById('heatmap');
            if(!heatmapEl) return;
            
            const weeks = 53; 
            let today = new Date();
            today.setHours(0,0,0,0);
            let current = new Date(today);
            current.setDate(today.getDate() - (weeks * 7) + 1);

            let html = '';
            let monthsHtml = '<div style="position: relative; height: 20px; margin-top: 5px; min-width: ' + (weeks * 19) + 'px;">';
            const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            let lastMonth = current.getMonth();

            for(let w = 0; w < weeks; w++) {
                html += '<div class="heatmap-col">';
                let colMonth = current.getMonth();
                if (colMonth !== lastMonth) {
                    let leftOffset = w * 19;
                    monthsHtml += `<span style="position: absolute; left: ${leftOffset}px; font-size: 0.8rem; color: #6b7280; font-weight: bold;">${monthNames[colMonth]}</span>`;
                    lastMonth = colMonth;
                }

                for(let d = 0; d < 7; d++) {
                    let dateStr = current.getFullYear() + '-' + String(current.getMonth()+1).padStart(2, '0') + '-' + String(current.getDate()).padStart(2, '0');
                    let count = rawHeatmap[dateStr] || 0;
                    
                    let level = 0;
                    if(count > 0) level = 1;
                    if(count >= 2) level = 2;
                    if(count >= 4) level = 3;
                    if(count >= 6) level = 4;
                    
                    let tooltip = count === 0 ? `No tasks on ${dateStr}` : `${count} tasks completed on ${dateStr}`;
                    
                    if(current > today) {
                        html += `<div class="heat-box empty"></div>`;
                    } else {
                        html += `<div class="heat-box level-${level}" title="${tooltip}"></div>`;
                    }
                    current.setDate(current.getDate() + 1);
                }
                html += '</div>';
            }
            monthsHtml += '</div>';
            heatmapEl.innerHTML = html;
            
            const oldRow = heatmapEl.nextElementSibling;
            if (oldRow && oldRow.style.position === 'relative') { oldRow.remove(); }
            heatmapEl.insertAdjacentHTML('afterend', monthsHtml);
            
            const wrapper = document.querySelector('.heatmap-scroll-wrapper');
            if(wrapper) wrapper.scrollLeft = wrapper.scrollWidth;
        }

        // SPA Transition wrapper
        async function executeSmoothUpdate(actionFn) {
            const dash = document.querySelector('.dashboard-container');
            dash.style.transition = 'filter 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease, transform 0.4s ease';
            dash.style.filter = 'blur(4px)';
            dash.style.opacity = '0.5';
            dash.style.transform = 'scale(0.98)';

            try {
                await actionFn();
            } catch(e) {
                console.error('SPA Update Error:', e);
            }

            setTimeout(() => {
                dash.style.filter = 'blur(0px)';
                dash.style.opacity = '1';
                dash.style.transform = 'scale(1)';
            }, 100);
        }

        // Fetch & render all dashboard components
        async function fetchAndRenderAll() {
            const token = getToken();
            const headers = {
                'Content-Type': 'application/json',
                'Authorization': `Token ${token}`
            };

            try {
                // Fetch stats & heatmap
                const statsRes = await fetch(`${API_BASE}/api/stats/`, { headers });
                if (!statsRes.ok) {
                    if (statsRes.status === 401) {
                        logoutLocal();
                        return;
                    }
                    throw new Error('Failed to fetch stats');
                }
                const statsData = await statsRes.json();
                document.getElementById('completedTasksCount').textContent = statsData.total_completed;
                document.getElementById('pendingTasksCount').textContent = statsData.total_pending;
                parseAndRenderHeatmap(statsData.heatmap_data || {});

                // Fetch tasks list
                const tasksRes = await fetch(`${API_BASE}/api/tasks/`, { headers });
                if (!tasksRes.ok) throw new Error('Failed to fetch tasks');
                const tasks = await tasksRes.json();

                const todoList = document.getElementById('todoList');
                todoList.innerHTML = '';

                if (tasks.length === 0) {
                    todoList.innerHTML = '<li class="todo-empty">No tasks yet. Enjoy your free time!</li>';
                } else {
                    tasks.forEach(task => {
                        const li = document.createElement('li');
                        li.className = `todo-item priority-${task.priority.toLowerCase()}`;
                        
                        const completedClass = task.completed ? 'completed-task' : '';
                        const completeLabel = task.completed ? 'Undo' : 'Complete';

                        li.innerHTML = `
                            <span class="todo-title ${completedClass}">
                                <span class="priority-badge">${task.priority}</span>
                                ${escapeHtml(task.title)}
                            </span>
                            <div class="todo-actions">
                                <button class="todo-complete ajax-btn">${completeLabel}</button>
                                <button class="todo-delete ajax-btn">Delete</button>
                            </div>
                        `;

                        // Attach handlers
                        li.querySelector('.todo-complete').addEventListener('click', () => toggleTask(task.id, !task.completed));
                        li.querySelector('.todo-delete').addEventListener('click', () => deleteTask(task.id));

                        todoList.appendChild(li);
                    });
                }
            } catch (err) {
                console.error('Fetch and Render error:', err);
            }
        }

        // Toggle Task Completed
        async function toggleTask(id, completed) {
            await executeSmoothUpdate(async () => {
                const res = await fetch(`${API_BASE}/api/tasks/${id}/`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Token ${getToken()}`
                    },
                    body: JSON.stringify({ completed })
                });
                if (!res.ok) throw new Error('Failed to update task');
                await fetchAndRenderAll();
            });
        }

        // Delete Task
        async function deleteTask(id) {
            await executeSmoothUpdate(async () => {
                const res = await fetch(`${API_BASE}/api/tasks/${id}/`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Token ${getToken()}`
                    }
                });
                if (!res.ok) throw new Error('Failed to delete task');
                await fetchAndRenderAll();
            });
        }

        // Add Task Form Handler
        document.getElementById('todoForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const titleInput = document.getElementById('taskTitle');
            const priorityInput = document.getElementById('taskPriority');
            const title = titleInput.value;
            const priority = priorityInput.value;

            await executeSmoothUpdate(async () => {
                const res = await fetch(`${API_BASE}/api/tasks/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Token ${getToken()}`
                    },
                    body: JSON.stringify({ title, priority })
                });
                if (!res.ok) throw new Error('Failed to add task');
                titleInput.value = '';
                await fetchAndRenderAll();
            });
        });

        // Initialize Page
        configPromise.then(() => {
            const token = getToken();
            const userObj = getUser();
            if (!token || !userObj) {
                window.location.href = 'login.html';
                return;
            }

            // Sync theme
            if (localStorage.getItem('theme') !== 'dark') {
                document.body.classList.add('light-mode');
            }

            // Welcome greeting
            document.getElementById('welcomeGreeting').textContent = `👋Welcome back, ${userObj.username}!`;

            // Profile Picture setup
            const profileIcon = document.getElementById('navProfileIcon');
            if (userObj.image_url) {
                profileIcon.innerHTML = `<img src="${getAvatarUrl(userObj.image_url)}" alt="Profile" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">`;
            } else {
                const firstLetter = userObj.username.charAt(0).toUpperCase();
                profileIcon.innerHTML = `<span style="font-size: 1.2rem; font-weight: bold; color: #e5e7eb;">${firstLetter}</span>`;
            }

            // Render dropdown content
            const dropdown = document.getElementById('profileDropdown');
            dropdown.innerHTML = `
                <div class="user-greeting">Hi, ${userObj.username}</div>
                <a href="index.html"><span class="material-symbols-outlined">home</span>Home</a>
                <a href="update_profile.html"><span class="material-symbols-outlined">background_replace</span>Update Image</a>
                <a href="index.html#about"><span class="material-symbols-outlined">chat_info</span>About</a>
                <a href="#" id="logoutBtn">Logout<span class="material-symbols-outlined">logout</span></a>
            `;
            document.getElementById('logoutBtn').addEventListener('click', (e) => {
                e.preventDefault();
                logout();
            });

            // Initial dashboard load
            fetchAndRenderAll();
        });

        // Dropdown Theme helper functions
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            if (document.body.classList.contains('light-mode')) {
                localStorage.setItem('theme', 'light');
            } else {
                localStorage.setItem('theme', 'dark');
            }
            // Trigger heatmap re-render to update the grid colors dynamically
            fetchAndRenderAll();
        }

        function toggleProfileDropdown() {
            document.getElementById("profileDropdown").classList.toggle("show");
        }

        window.onclick = function(event) {
            if (!event.target.closest('.profile-icon')) {
                var dropdown = document.getElementById("profileDropdown");
                if (dropdown && dropdown.classList.contains('show')) {
                    dropdown.classList.remove('show');
                }
            }
        }

        // Particle System
        const canvas = document.getElementById('networkCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function initParticles() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            const numParticles = Math.floor((width * height) / 12000); 
            for (let i = 0; i < numParticles; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 1.2,
                    vy: (Math.random() - 0.5) * 1.2,
                    radius: Math.random() * 2 + 1
                });
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, width, height);
            const isLightMode = document.body.classList.contains('light-mode');
            const particleColor = isLightMode ? 'rgba(79, 70, 229, 0.7)' : 'rgba(139, 92, 246, 0.6)';
            const lineRGB = isLightMode ? '99, 102, 241' : '59, 130, 246';
            const lineAlpha = isLightMode ? 0.6 : 0.4;

            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                
                if (p.x < 0 || p.x > width) p.vx *= -1;
                if (p.y < 0 || p.y > height) p.vy *= -1;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = particleColor;
                ctx.fill();
                
                for (let j = i + 1; j < particles.length; j++) {
                    let p2 = particles[j];
                    let dx = p.x - p2.x;
                    let dy = p.y - p2.y;
                    let distSq = dx * dx + dy * dy;
                    
                    if (distSq < 16900) {
                        let dist = Math.sqrt(distSq);
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(${lineRGB}, ${lineAlpha * (1 - dist / 130)})`;
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', initParticles);
        initParticles();
        animateParticles();
    </script>
</body>
